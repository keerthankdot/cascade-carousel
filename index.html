<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cascading Gallery Slider</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  gap: 28px;
}

.eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: rgba(0, 0, 0, 0.35);
}

/* ─── Slider ───────────────────────────────────────────────────────── */

.slider {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 1120px;
  height: calc(min(100vw - 96px, 1072px) * 3 / 8);
}

/* ─── Card base ─────────────────────────────────────────────────────── */

.card {
  position: relative;
  flex: 1 1 0%;           /* flex-grow:1 strip state */
  min-width: 68px;
  border-radius: 26px;
  overflow: hidden;
  cursor: pointer;
  user-select: none;
  /* spring: slight overshoot for tactile feel */
  transition: flex-grow 0.72s cubic-bezier(0.32, 1.28, 0.55, 1);
}

.card.active {
  flex-grow: 8;
  cursor: default;
}

.card:not(.active):hover {
  flex-grow: 1.4;
}

/* ─── Background image ──────────────────────────────────────────────── */

.card__bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  transition: transform 0.72s cubic-bezier(0.32, 1.28, 0.55, 1);
}

.card__video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card:not(.active):hover .card__bg {
  transform: scale(1.08);
}

/* ─── Strip dark tint (disappears when active) ───────────────────────── */

.card:not(.active)::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 1;
  background: rgba(0, 0, 0, 0.22);
  transition: background 0.3s ease;
  pointer-events: none;
}

.card:not(.active):hover::before {
  background: rgba(0, 0, 0, 0.06);
}

/* ─── Gradient scrim (active only) ─────────────────────────────────── */

.card__scrim {
  position: absolute;
  inset: 0;
  z-index: 2;
  background: linear-gradient(
    0deg,
    transparent 20%,
    rgba(0, 0, 0, 0.12) 50%,
    rgba(0, 0, 0, 0.72) 100%
  );
  opacity: 0;
  transition: opacity 0.52s ease;
  pointer-events: none;
}

.card.active .card__scrim {
  opacity: 1;
}

/* ─── Text content (active only) ────────────────────────────────────── */

.card__content {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 3;
  padding: 30px 32px 34px;
  opacity: 0;
  transform: translateY(-16px);
  transition:
    opacity 0.38s ease 0.18s,
    transform 0.38s ease 0.18s;
  pointer-events: none;
}

.card.active .card__content {
  opacity: 1;
  transform: translateY(0);
}

.card__label {
  display: block;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 2.8px;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.52);
  margin-bottom: 8px;
}

.card__title {
  font-size: 34px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -1.2px;
  line-height: 1.02;
  margin-bottom: 10px;
}

.card__desc {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.62);
  line-height: 1.62;
  max-width: 360px;
}

/* ─── Strip icon ─────────────────────────────────────────────────────── */

.card__icon {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(ellipse at 38% 28%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.04) 55%, transparent 72%),
    rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(20px) brightness(1.15) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) brightness(1.15) saturate(1.6);
  border: 1px solid rgba(255, 255, 255, 0.55);
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,0.7),
    inset 0 -1px 0 rgba(0,0,0,0.08),
    0 6px 20px rgba(0,0,0,0.2);
  font-size: 13px;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.9);
  letter-spacing: 0;
  transition:
    opacity 0.3s ease,
    transform 0.3s ease;
}

.card.active .card__icon {
  opacity: 0;
  transform: translateX(-50%) scale(0.6);
  pointer-events: none;
}

/* ─── Hero text ─────────────────────────────────────────────────────── */

.hero-text {
  text-align: center;
  max-width: 700px;
  margin-bottom: 8px;
}

.hero-title {
  font-size: 32px;
  font-weight: 800;
  color: #0d0d0d;
  letter-spacing: -0.8px;
  line-height: 1.1;
  margin-bottom: 10px;
}

.hero-sub {
  font-size: 15px;
  color: #444;
  line-height: 1.6;
}

/* ─── Keyboard hint ─────────────────────────────────────────────────── */

.hint {
  font-size: 11px;
  color: rgba(0, 0, 0, 0.25);
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div class="hero-text">
  <h2 class="hero-title">No two calibrations are ever the same.</h2>
  <p class="hero-sub">Your pressure distribution is as unique as your fingerprint. Calibr8 reads it. Then builds around it.</p>
</div>

<div class="slider" id="slider"></div>
<p class="hint">click a strip &nbsp;·&nbsp; ← → to navigate</p>

<script>
/* ─── Icon SVGs ─────────────────────────────────────────────────────── */

/* Scan — scanner frame with sweep line */
function scanIcon(c) {
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
    <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
    <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
    <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
  </svg>`;
}

/* Heat map — flame */
function heatmapIcon(c) {
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
  </svg>`;
}

/* Calibration — vertical sliders */
function calibrationIcon(c) {
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="4" y1="21" x2="4" y2="14"/>
    <line x1="4" y1="6" x2="4" y2="3"/>
    <line x1="12" y1="21" x2="12" y2="12"/>
    <line x1="12" y1="4" x2="12" y2="3"/>
    <line x1="20" y1="21" x2="20" y2="16"/>
    <line x1="20" y1="8" x2="20" y2="3"/>
    <line x1="1" y1="14" x2="7" y2="14"/>
    <line x1="9" y1="4" x2="15" y2="4"/>
    <line x1="17" y1="16" x2="23" y2="16"/>
  </svg>`;
}

/* Report — document with lines */
function reportIcon(c) {
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
    <line x1="10" y1="9" x2="8" y2="9"/>
  </svg>`;
}

/* Final mattress — bed */
function mattressIcon(c) {
  return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 20v-8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v8"/>
    <path d="M4 10V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4"/>
    <line x1="2" y1="18" x2="22" y2="18"/>
    <path d="M6 10V8a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v2"/>
    <path d="M13 10V8a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v2"/>
  </svg>`;
}

/* ─── Card data ─────────────────────────────────────────────────────── */

const CARDS = [
  {
    id: 0,
    title: 'Scan',
    label: 'Desert',
    desc: 'Scans & measures 8 zones of your body to identify exact pressure points. The pressure mapping sensor mat analyzes how your body weight is distributed across 8 zones, detecting areas where support needs adjustment.',
    img: 'card1.png',
    iconColor: '#60a5fa',
    iconBg: 'rgba(96,165,250,0.28)',
    icon: scanIcon('#ffffff'),
  },
  {
    id: 1,
    title: 'Heat map',
    label: 'Mountain',
    desc: 'In real time the system shows a pressure map from Blue → Red so you can see exactly where your body feels the pressure.',
    img: 'card2.png',
    iconColor: '#f87171',
    iconBg: 'rgba(248,113,113,0.28)',
    icon: heatmapIcon('#ffffff'),
  },
  {
    id: 2,
    title: 'Calibration',
    label: 'Arctic',
    desc: 'The system reconfigures the middle support layer while scanning, until every zone reaches optimal balance — ensuring optimal firmness and comfort across 8 adaptive zones, aligning your spine and reducing pressure points.',
    img: null,
    video: 'card3.mp4',
    iconColor: '#a78bfa',
    iconBg: 'rgba(167,139,250,0.28)',
    icon: calibrationIcon('#ffffff'),
  },
  {
    id: 3,
    title: 'Report',
    label: 'Woodland',
    desc: 'You receive a unique report based on your calibration, helping you proceed with ordering your personalised mattress.',
    img: 'card4.png',
    iconColor: '#4ade80',
    iconBg: 'rgba(74,222,128,0.28)',
    icon: reportIcon('#ffffff'),
  },
  {
    id: 4,
    title: 'Final mattress',
    label: 'Lakeside',
    desc: 'A one of a kind personalised mattress designed just for you, built from scratch and delivered to your home.',
    img: 'card5.png',
    iconColor: '#fbbf24',
    iconBg: 'rgba(251,191,36,0.28)',
    icon: mattressIcon('#ffffff'),
  },
];

/* ─── State ─────────────────────────────────────────────────────────── */

let activeId = 0;

/* ─── Build DOM ─────────────────────────────────────────────────────── */

function buildSlider() {
  const slider = document.getElementById('slider');
  CARDS.forEach(card => {
    const el = document.createElement('div');
    el.className = 'card' + (card.id === activeId ? ' active' : '');
    el.dataset.id = card.id;
    el.innerHTML = `
      ${card.video
        ? `<video class="card__bg card__video" src="${card.video}" autoplay loop muted playsinline></video>`
        : `<div class="card__bg" style="background-image:url('${card.img}')"></div>`
      }
      <div class="card__scrim"></div>
      <div class="card__content">
        <div class="card__title">${card.title}</div>
        <div class="card__desc">${card.desc}</div>
      </div>
      <div class="card__icon">${card.id + 1}</div>
    `;
    el.addEventListener('click', () => activate(parseInt(el.dataset.id)));
    slider.appendChild(el);
  });
}

/* ─── Activate ──────────────────────────────────────────────────────── */

function activate(id) {
  if (id === activeId) return;
  document.querySelectorAll('.card').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.id) === id);
  });
  activeId = id;
}

/* ─── Keyboard nav ──────────────────────────────────────────────────── */

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') activate((activeId + 1) % CARDS.length);
  if (e.key === 'ArrowLeft')  activate((activeId - 1 + CARDS.length) % CARDS.length);
});

buildSlider();
</script>
</body>
</html>
